name: Github Pages Astro CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"

jobs:
  combined-workflow:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend/
        run: npm ci

      - name: Build frontend
        working-directory: frontend/
        env:
          KICKBASE_EMAIL: ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASSWORD: ${{ secrets.KICKBASE_PASSWORD }}
          KICKBASE_COMPETITION_ID: ${{ secrets.KICKBASE_COMPETITION_ID }}
          KICKBASE_LEAGUE_ID: ${{ secrets.KICKBASE_LEAGUE_ID }}
          KICKBASE_TOKEN: ${{ secrets.KICKBASE_TOKEN }}
        run: |
          npm run build
          ls -la

      - name: Deploy frontend
        uses: peaceiris/actions-gh-pages@v4
        with:
           personal_token: ${{ secrets.API_TOKEN_GITHUB }}
           external_repository: senoramarillo/kickbase-bundesliga
           publish_branch: gh-pages
           publish_dir: frontend/dist
           user_name: github-actions[bot]
           user_email: github-actions[bot]@users.noreply.github.com
           force_orphan: true
